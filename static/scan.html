<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Tara</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--acc:#38bdf8;--txt:#e2e8f0;--mut:#94a3b8;}
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt)}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  h1{font-size:1.3rem}
  .card{background:var(--card);border-radius:14px;padding:16px}
  #reader{width:100%;border-radius:10px;overflow:hidden}
  .result{margin-top:12px;padding:12px;border-radius:9px;background:#0b1220;white-space:pre-wrap;word-break:break-all;font-size:.9rem}
  .ok{border-left:3px solid #22c55e} .err{border-left:3px solid #ef4444}
  .hidden{display:none}
</style></head><body>
<div class="wrap">
  <h1>QR Tara</h1>
  <div class="card">
    <p style="color:var(--mut);margin-top:0">Kameranı QR koda tut. Sonuç bir linkse oraya, değilse detay sayfasına gider.</p>
    <div id="reader"></div>
    <div id="result" class="result hidden"></div>
  </div>
</div>
<script>
let scanner=null;
function startScanner(){
  if(scanner) return;
  scanner=new Html5Qrcode("reader");
  Html5Qrcode.getCameras().then(cameras=>{
    if(!cameras||cameras.length===0){ show("Kamera bulunamadı.",false); scanner=null; return; }
    const back=cameras.find(c=>/back|rear|environment/i.test(c.label));
    const camId=(back||cameras[cameras.length-1]).id;
    scanner.start(camId,{fps:10,qrbox:{width:220,height:220}},onScan)
      .catch(err=>{ show("Kamera açılamadı: "+err,false); scanner=null; });
  }).catch(err=>{ show("Kamera listesi alınamadı: "+err,false); scanner=null; });
}
function stopScanner(){ if(scanner){ scanner.stop().then(()=>scanner=null).catch(()=>scanner=null);} }

function onScan(text){
  stopScanner();
  show("Okundu: "+text+"\nYönlendiriliyor...",true);
  const t=text.trim();
  if(/^https?:\/\//i.test(t)){ location.href=t; }          // tam URL ise direkt git
  else { location.href='/c/'+encodeURIComponent(t); }       // sadece kod ise detay sayfası
}
function show(msg,ok){ const el=document.getElementById('result'); el.textContent=msg; el.className='result '+(ok?'ok':'err'); el.classList.remove('hidden'); }
startScanner();
</script>
</body></html>
