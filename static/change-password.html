<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şifre Değiştir</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--acc:#38bdf8;--txt:#e2e8f0;--mut:#94a3b8;}
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);
    display:flex;min-height:100vh;align-items:center;justify-content:center}
  .card{background:var(--card);padding:28px;border-radius:16px;width:340px}
  h1{font-size:1.25rem;margin:0 0 6px}
  p.info{color:var(--mut);font-size:.85rem;margin:0 0 16px}
  label{font-size:.85rem;color:var(--mut)}
  input{width:100%;padding:11px;border-radius:9px;border:1px solid #334155;background:#0b1220;color:var(--txt);margin:6px 0 12px;font-size:1rem}
  button{width:100%;padding:12px;border:none;border-radius:9px;background:var(--acc);color:#04212e;font-weight:600;font-size:1rem;cursor:pointer}
  .msg{font-size:.9rem;min-height:1.2em;margin-top:10px}
  .err{color:#f87171} .ok{color:#22c55e}
</style></head><body>
<div class="card">
  <h1>Şifre Değiştir</h1>
  <p class="info">Devam etmek için yeni bir şifre belirle.</p>
  <label>Mevcut (geçici) şifre</label>
  <input id="cur" type="password" autocomplete="current-password">
  <label>Yeni şifre</label>
  <input id="n1" type="password" autocomplete="new-password">
  <label>Yeni şifre (tekrar)</label>
  <input id="n2" type="password" autocomplete="new-password">
  <button onclick="save()">Kaydet ve devam et</button>
  <div class="msg err" id="msg"></div>
</div>
<script>
async function save(){
  const msg=document.getElementById('msg'); msg.className='msg err'; msg.textContent='';
  const cur=document.getElementById('cur').value;
  const n1=document.getElementById('n1').value;
  const n2=document.getElementById('n2').value;
  if(n1.length<4){ msg.textContent='Yeni şifre en az 4 karakter olmalı'; return; }
  if(n1!==n2){ msg.textContent='Yeni şifreler eşleşmiyor'; return; }
  const r=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({current_password:cur,new_password:n1})});
  if(r.ok){ msg.className='msg ok'; msg.textContent='Güncellendi, yönlendiriliyor...'; setTimeout(()=>location.href='/',800); }
  else { msg.textContent=await r.text(); }
}
</script>
</body></html>
